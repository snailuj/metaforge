# M02-S04-C — Threshold-percentile sensitivity sweep.
#
# Every M02 sweep so far has run at threshold_percentile=95. With ~232 apt
# and ~317 inapt resolvable pairs, p95 lands on a thin slice of the inapt
# tail and is unstable. C tests whether algorithm-vs-null separations
# behave differently at other percentiles — if they do, a single-pct
# verdict is fragile.
#
# Design: cross-product of all 7 currently-registered scoring fns × 5
# threshold percentiles (50/75/90/95/99). 35 variations total.
#
# Run with:
#   data-pipeline/.venv/bin/python data-pipeline/scripts/run_sweep.py \
#     --config data-pipeline/sweeps/m02_s04_threshold_sensitivity.yaml \
#     --output data-pipeline/output/sweep_m02_s04_threshold_sensitivity.json \
#     --report data-pipeline/output/sweep_m02_s04_threshold_sensitivity.md
#
# Pre-flight: DO NOT run this until S04-A and S04-B findings are surfaced
# and the cohort-attrition fixes (if any) are in place. Running on the
# current biased cohort will just produce a 35-row table that confirms
# the bias at every threshold pct, not lift signal.
#
# See `M02-S04-C-threshold-sensitivity-design.md` for the analytic plan.

name: m02_s04_threshold_sensitivity
db: data-pipeline/output/lexicon_v2.db
pairs: data-pipeline/fixtures/metaphor_pairs_v2.json
controls: data-pipeline/fixtures/munch_inapt.jsonl
mrr_reference: data-pipeline/output/eval_baseline_v2.json

variations:
  # jaccard_salience across percentiles
  - name: jaccard_salience_p50
    scoring: jaccard_salience
    threshold_percentile: 50
